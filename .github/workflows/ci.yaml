name: CI - Staging

on:
  push:
    branches:
      # Specify your staging branch
      - staging
  pull_request:
    branches:
      - staging

# Needed for nx-set-shas when run on the staging branch
permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      # Enable distribution for staging
      - run: |
          npx nx-cloud start-ci-run \
            --distribute-on="3 linux-small-js, 2 linux-medium-js, 1 linux-large-js" \
            --stop-agents-after="e2e-ci"

      - run: npm ci --legacy-peer-deps

      - uses: nrwl/nx-set-shas@v4

      # Specify targets for staging
      - run: npx nx-cloud record -- nx format:check
      - run: npx nx affected -t lint test build e2e-ci --configuration=staging

      # Define assignment rules for staging
      - run: |
          echo "Setting assignment rules for staging..."
          npx nx-cloud set-assignment-rules \
            --rules='[
              {
                "project": "app1",
                "target": "build",
                "configuration": "staging",
                "runsOn": ["linux-large-js", "linux-medium-js"]
              }
            ]'
